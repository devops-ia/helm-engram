sources:
  engram:
    kind: githubrelease
    spec:
      owner: "Gentleman-Programming"
      repository: "engram"
      token: {{ requiredEnv "GITHUB_TOKEN" }}
      versionFilter:
        kind: semver
        pattern: ">=v1.0.0"
conditions: {}
targets:
  imageTag:
    name: bump engram image tag in values.yaml
    kind: helmchart
    spec:
      name: charts/engram
      file: values.yaml
      key: $.image.tag
    sourceid: engram
  appVersion:
    name: bump appVersion in Chart.yaml
    kind: helmchart
    spec:
      name: charts/engram
      file: Chart.yaml
      key: $.appVersion
    sourceid: engram
  # NOTE: chart version ($.version) is NOT managed here.
  # When a new Engram release is detected, the helm-check-engram-release.yml workflow
  # sets the chart version to match the appVersion (strip 'v'), e.g., v1.15.13 → 1.15.13.
  # For chart-only changes (no upstream release), bump the patch manually:
  #   1.15.13 → 1.15.14 using: npm run version:bump
