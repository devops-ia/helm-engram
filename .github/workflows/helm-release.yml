name: Release Helm Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/engram/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get chart version from Chart.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' charts/engram/Chart.yaml | awk '{print $2}')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

  create-tag:
    needs: get-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create version tag if it does not exist
        id: tag
        env:
          TAG: ${{ needs.get-version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "created=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: [get-version, create-tag]
    if: needs.create-tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@a0d2dc62c5e491af8ef6ba64a2e02bcf3fb33aa1 # v1.7.0
        with:
          config: .github/cr.yaml
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish landing page to gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          cp index.html /tmp/gh-pages/index.html
          cd /tmp/gh-pages
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update landing page [skip ci]"
          git push origin gh-pages
