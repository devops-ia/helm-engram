name: Lint and Test Helm Charts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "charts/engram/**"

permissions: {}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Install chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0

      - name: Run chart-testing lint
        run: ct lint --chart-dirs charts --all --validate-maintainers=false

      - name: Add Bitnami Helm repository
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: Update Helm dependencies
        run: helm dependency update charts/engram/

      - name: Run unit tests
        run: helm unittest charts/engram/

      - name: Run helm template smoke test (minimal)
        run: helm template engram charts/engram -f charts/engram/ci/values-minimal.yaml > /dev/null

      - name: Run helm template smoke test (full)
        run: helm template engram charts/engram -f charts/engram/ci/values-full.yaml > /dev/null

      - name: Run helm template smoke test (ingress)
        run: helm template engram charts/engram -f charts/engram/ci/values-ingress.yaml > /dev/null
