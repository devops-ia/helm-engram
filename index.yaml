apiVersion: v1
entries:
  engram:
  - annotations:
      artifacthub.io/category: ai-ml
      artifacthub.io/changes: |
        - kind: added
          description: "Built-in /tmp emptyDir volume for readOnlyRootFilesystem compatibility (tmpVolume.enabled)"
        - kind: added
          description: "ENGRAM_CLOUD_ADMIN support via engram.adminToken (dashboard /admin access)"
        - kind: added
          description: "ENGRAM_CLOUD_TOKEN support via engram.cloudToken (bearer token auth)"
        - kind: added
          description: "Optional NetworkPolicy template (networkPolicy.enabled)"
        - kind: added
          description: "PDB maxUnavailable option, mutually exclusive with minAvailable"
        - kind: added
          description: "runAsNonRoot: true in podSecurityContext"
        - kind: fixed
          description: "CI: minimal-values.yaml was missing allowedProjects (caused silent crash on install)"
        - kind: changed
          description: "CI: helm unittest runs before ct lint and ct install"
