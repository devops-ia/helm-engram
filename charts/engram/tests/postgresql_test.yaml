suite: postgresql internal templates tests
templates:
  - templates/secret.yaml
  - templates/deployment.yaml
  - templates/postgresql/secret.yaml
  - templates/postgresql/service.yaml
  - templates/postgresql/statefulset.yaml

tests:
  # ── DSN auto-generation ────────────────────────────────────────────────────

  - it: should auto-build ENGRAM_DATABASE_URL from internal postgresql when postgresql.enabled=true
    template: templates/secret.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.username: engram
      postgresql.auth.password: supersecret
      postgresql.auth.database: engram_cloud
      engram.jwtSecret: my-jwt-secret
    asserts:
      - isKind:
          of: Secret
      - matchRegex:
          path: data.ENGRAM_DATABASE_URL
          pattern: "^.+$"

  - it: should prefer engram.databaseUrl over auto-generated DSN when both are set
    template: templates/secret.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.username: engram
      postgresql.auth.password: ignored
      postgresql.auth.database: engram_cloud
      engram.databaseUrl: "postgres://custom:custom@my-db:5432/mydb?sslmode=require"
      engram.jwtSecret: my-jwt-secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.ENGRAM_DATABASE_URL
          value: "cG9zdGdyZXM6Ly9jdXN0b206Y3VzdG9tQG15LWRiOjU0MzIvbXlkYj9zc2xtb2RlPXJlcXVpcmU="

  - it: should not render engram secret when existingSecret is set
    template: templates/secret.yaml
    set:
      postgresql.enabled: true
      engram.existingSecret: my-external-secret
      engram.jwtSecret: my-jwt-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should reference correct postgresql host in auto-generated DSN
    template: templates/secret.yaml
    release:
      name: my-release
    set:
      postgresql.enabled: true
      postgresql.auth.username: engram
      postgresql.auth.password: testpass
      postgresql.auth.database: engram_cloud
      engram.jwtSecret: my-jwt-secret
      engram.databaseUrl: ""
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.ENGRAM_DATABASE_URL
          value: "cG9zdGdyZXM6Ly9lbmdyYW06dGVzdHBhc3NAbXktcmVsZWFzZS1wb3N0Z3Jlc3FsOjU0MzIvZW5ncmFtX2Nsb3VkP3NzbG1vZGU9ZGlzYWJsZQ=="

  # ── PostgreSQL Secret ──────────────────────────────────────────────────────

  - it: should render postgresql secret when postgresql.enabled=true
    template: templates/postgresql/secret.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.password: mysecretpassword
      engram.jwtSecret: jwt
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: data.password
          value: "bXlzZWNyZXRwYXNzd29yZA=="

  - it: should not render postgresql secret when postgresql.enabled=false
    template: templates/postgresql/secret.yaml
    set:
      postgresql.enabled: false
      engram.jwtSecret: jwt
    asserts:
      - hasDocuments:
          count: 0

  # ── PostgreSQL Service ─────────────────────────────────────────────────────

  - it: should render postgresql service when postgresql.enabled=true
    template: templates/postgresql/service.yaml
    release:
      name: test
    set:
      postgresql.enabled: true
      postgresql.service.port: 5432
      engram.jwtSecret: jwt
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-postgresql
      - equal:
          path: spec.ports[0].port
          value: 5432

  - it: should not render postgresql service when postgresql.enabled=false
    template: templates/postgresql/service.yaml
    set:
      postgresql.enabled: false
      engram.jwtSecret: jwt
    asserts:
      - hasDocuments:
          count: 0

  # ── PostgreSQL StatefulSet ─────────────────────────────────────────────────

  - it: should render postgresql statefulset when postgresql.enabled=true
    template: templates/postgresql/statefulset.yaml
    release:
      name: test
    set:
      postgresql.enabled: true
      postgresql.image.registry: docker.io
      postgresql.image.repository: postgres
      postgresql.image.tag: "16-alpine"
      postgresql.auth.username: engram
      postgresql.auth.database: engram_cloud
      engram.jwtSecret: jwt
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: test-postgresql
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/postgres:16-alpine"

  - it: should set POSTGRES_USER and POSTGRES_DB env vars
    template: templates/postgresql/statefulset.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.username: myuser
      postgresql.auth.database: mydb
      engram.jwtSecret: jwt
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_USER
            value: "myuser"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: "mydb"

  - it: should reference postgresql secret for POSTGRES_PASSWORD
    template: templates/postgresql/statefulset.yaml
    release:
      name: rel
    set:
      postgresql.enabled: true
      postgresql.auth.username: engram
      postgresql.auth.database: engram_cloud
      engram.jwtSecret: jwt
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
          value: rel-postgresql
      - equal:
          path: spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.key
          value: password

  - it: should create volumeClaimTemplate when persistence.enabled=true
    template: templates/postgresql/statefulset.yaml
    set:
      postgresql.enabled: true
      postgresql.persistence.enabled: true
      postgresql.persistence.size: 5Gi
      postgresql.persistence.accessMode: ReadWriteOnce
      engram.jwtSecret: jwt
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: "5Gi"

  - it: should use emptyDir when persistence.enabled=false
    template: templates/postgresql/statefulset.yaml
    set:
      postgresql.enabled: true
      postgresql.persistence.enabled: false
      engram.jwtSecret: jwt
    asserts:
      - isNull:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should not render postgresql statefulset when postgresql.enabled=false
    template: templates/postgresql/statefulset.yaml
    set:
      postgresql.enabled: false
      engram.jwtSecret: jwt
    asserts:
      - hasDocuments:
          count: 0

