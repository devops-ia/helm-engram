suite: ingress tests
templates:
  - templates/ingress.yaml

tests:
  - it: should not render Ingress when disabled by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Ingress

  - it: should set default host from values
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: engram.local

  - it: should point backend to the chart service on port 18080
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-engram
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 18080

  - it: should set ingressClassName when provided
    set:
      ingress.enabled: true
      ingress.className: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should render TLS block when configured
    set:
      ingress.enabled: true
      ingress.tls:
        - secretName: engram-tls
          hosts:
            - engram.local
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: engram-tls

  - it: should apply ingress annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/rewrite-target"]
          value: /
