suite: secret tests
templates:
  - templates/secret.yaml

tests:
  - it: should create a Secret when existingSecret is empty
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: Secret
      - equal:
          path: type
          value: Opaque

  - it: should NOT create a Secret when existingSecret is set
    set:
      engram.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should contain ENGRAM_DATABASE_URL key
    set:
      engram.databaseUrl: "postgres://user:pass@host:5432/db"
      engram.jwtSecret: "test-secret"
    asserts:
      - isNotNullOrEmpty:
          path: data["ENGRAM_DATABASE_URL"]

  - it: should contain ENGRAM_JWT_SECRET key
    set:
      engram.databaseUrl: "postgres://user:pass@host:5432/db"
      engram.jwtSecret: "test-secret"
    asserts:
      - isNotNullOrEmpty:
          path: data["ENGRAM_JWT_SECRET"]

  - it: should base64-encode the databaseUrl value
    set:
      engram.databaseUrl: "postgres://user:pass@host:5432/db"
    asserts:
      - equal:
          path: data["ENGRAM_DATABASE_URL"]
          value: "cG9zdGdyZXM6Ly91c2VyOnBhc3NAaG9zdDo1NDMyL2Ri"

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: engram
