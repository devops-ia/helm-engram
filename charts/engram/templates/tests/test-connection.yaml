apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "engram.fullname" . }}-test-connection"
  labels:
    {{- include "engram.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    fsGroup: 65534
  containers:
    - name: test-connection
      image: curlimages/curl:8.11.1
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          set -e
          echo "Testing connection to {{ include "engram.fullname" . }}:{{ .Values.service.port }}/health ..."
          curl -fsS --max-time 10 \
            http://{{ include "engram.fullname" . }}:{{ .Values.service.port }}/health
          echo ""
          echo "Connection test passed."
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
