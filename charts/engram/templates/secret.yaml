{{- if not .Values.engram.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "engram.fullname" . }}
  labels:
    {{- include "engram.labels" . | nindent 4 }}
type: Opaque
data:
  ENGRAM_DATABASE_URL: {{ include "engram.databaseUrl" . | b64enc | quote }}
  ENGRAM_JWT_SECRET: {{ .Values.engram.jwtSecret | b64enc | quote }}
  {{- if .Values.engram.adminToken }}
  ENGRAM_CLOUD_ADMIN: {{ .Values.engram.adminToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.engram.cloudToken }}
  ENGRAM_CLOUD_TOKEN: {{ .Values.engram.cloudToken | b64enc | quote }}
  {{- end }}
{{- end }}
