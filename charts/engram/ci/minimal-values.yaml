# Minimal CI values — uses bundled PostgreSQL (postgresql.enabled=true by default)
# insecureNoAuth=true disables cloud token auth (CI-only, never use in production)
engram:
  jwtSecret: "ci-test-jwt-secret-do-not-use-in-production"
  insecureNoAuth: true
  # allowedProjects is required even in insecureNoAuth mode — binary exits immediately when empty
  allowedProjects: "project1,project2"
